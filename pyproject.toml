[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sklearn-morpho"
version = "0.1.0"
dependencies = [
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.envs.default]
python = "3.14"
dependencies = [
    "cvxpy",
    "matplotlib",
    "numpy",
    "pandas", # for scikit-learn's check_estimator
    "pyqt6", # for matplotlib display
    "pytest",
    "pytest-cov",
    "scikit-learn",
]

[tool.hatch.envs.default.scripts]
main = "python -m sklearn_morpho"
