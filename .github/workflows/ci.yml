name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: python:3.14-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hatch
        run: pip install hatch

      - name: Run tests
        run: hatch run pytest
