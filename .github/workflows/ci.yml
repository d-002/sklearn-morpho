name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  PIP_CACHE_DIR: "${{ github.workspace }}/.cache/pip"
  HATCH_DATA_DIR: "${{ github.workspace }}/.hatch-data"
  PIP_ROOT_USER_ACTION: "ignore"
  HATCH_ENV_TYPE_VIRTUAL_PATH: ".venv"

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: python:3.14-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache dependencies and Hatch envs
        uses: actions/cache@v4
        with:
          path: |
            .cache/pip
            .hatch-data
            .venv

          key: ${{ github.ref_name }}-hatch-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ github.ref_name }}-hatch-

      - name: Install Hatch
        run: pip install --cache-dir .cache/pip hatch

      - name: Run tests
        run: hatch run pytest
