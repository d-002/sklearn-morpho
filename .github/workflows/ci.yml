name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Hatch
        run: python -m pip install hatch

      - name: Run tests
        run: hatch run pytest

  coverage:
    name: Coverage test, ignore failed tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Hatch
        run: python -m pip install hatch

      - name: Install coverage utilities
        run: python -m pip install coverage

      - name: Check coverage
        run: |
          hatch run pytest --cov --cov-fail-under=90

  todo:
    name: Check for TODOs in code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for TODOs in the code
        run: ./check_todos.sh

  linter:
    name: Check for ${{ matrix.name }} errors
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: "linting"
            command: "python -m ruff check"
          - name: "coding style"
            command: "[ -z \"$(python -m ruff format | grep reformatted)\" ]"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linter
        run: python -m pip install ruff

      - name: Run linter for coding style errors
        run: ${{ matrix.command }}
