name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [
          ubuntu-latest,
          windows-latest,
          macos-latest,
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Hatch
        run: python -m pip install hatch

      - name: Run tests
        run: hatch run pytest

  coverage:
    name: Coverage test, ignore failed tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Hatch
        run: python -m pip install hatch

      - name: Install coverage utilities
        run: python -m pip install coverage

      - name: Check coverage
        run: |
          hatch run pytest --cov --cov-fail-under=90

  todo:
    name: Check for TODOs in code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for TODOs in the code
        run: ./check_todos.sh

  coding-style:
    name: Check coding style errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install linter
        run: python -m pip install ruff

      - name: Run linter
        run: python -m ruff check
