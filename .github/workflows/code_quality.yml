name: Code quality

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: "code quality"
  cancel-in-progress: true

jobs:
  todo:
    name: Check for TODOs in code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for TODOs in the code
        run: ./check_todos.sh

  types:
    name: Check for typing errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install Hatch
        run: pip install hatch

      - name: Run mypy through hatch
        run: hatch run mypy:mypy src tests

  lint:
    name: Check for ${{ matrix.name }} errors
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "generic linting"
            command: "python -m ruff check"
          - name: "coding style"
            command: "[ -z \"$(python -m ruff format | grep reformatted)\" ]"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install linter
        run: pip install ruff

      - name: Run linter for ${{ matrix.name }} errors
        run: ${{ matrix.command }}
